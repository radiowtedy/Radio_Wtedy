<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- WYMUSZENIE ODŚWIEŻANIA DLA SŁUCHACZY - BLOKADA CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- EMBEDOWANIE CZCIONKI MASZYNY Z GOOGLE FONTS -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cutive+Mono&display=swap" rel="stylesheet">
    
    <title>radio wtedy - słuchaj na żywo</title>
    <style>
        body { 
            /* CZARNO-SZARE TŁO O FAKTURZE POMIĘTEGO PAPIERU */
            background-color: #121212;
            background-image: url('https://transparenttextures.com');
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            text-align: center; 
            padding: 30px; 
            /* SUBTELNA PRZEZROCZYSTOŚĆ ABY PRZEŚWITYWAŁA TEKSTURA */
            background: rgba(30, 30, 30, 0.85); 
            border-radius: 15px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.7); 
            max-width: 450px; 
            width: 90%; 
            backdrop-filter: blur(4px); /* delikatne rozmycie tła za ramką */
        }
        /* STYL AMERICAN TYPEWRITER / CUTIVE MONO */
        h1 { 
            margin-bottom: 25px; 
            font-size: 32px; 
            font-weight: normal; 
            font-family: 'American Typewriter', 'Cutive Mono', Georgia, serif; 
            letter-spacing: 0px;
            color: #ffffff;
            text-transform: lowercase; 
        }
        .player-box { 
            margin-top: 20px; 
            width: 100%; 
        }
        audio {
            width: 100%;
        }
        /* STYL DLA RETRO LINKU WSPARCIA */
        .support-link {
            margin-top: 25px;
            display: block;
            font-family: 'American Typewriter', 'Cutive Mono', Georgia, serif;
            font-size: 12px; 
            color: #aaaaaa;
            text-decoration: underline;
            text-transform: lowercase;
            transition: color 0.2s ease;
        }
        .support-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>radio wtedy</h1>
        
        <div class="player-box">
            <!-- ODWARZACZ LIVE ZE SLOTEX.PL -->
            <audio controls preload="none"><source src="https://s3.slotex.pl/shoutcast/7124/stream?sid=1"></audio>
        </div>

        <!-- LINK DO WSPIERANIA RADIA NA SUPPI -->
        <a href="http://suppi.pl" target="_blank" class="support-link">wspieraj na suppi.pl/radiowtedy</a>
    </div>

</body>
</html>
