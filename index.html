<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- WYMUSZENIE ODŚWIEŻANIA DLA SŁUCHACZY - BLOKADA CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- EMBEDOWANIE CZCIONKI RETRO MASZYNY Z GOOGLE FONTS -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <title>Radio Wtedy - Słuchaj na żywo</title>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            text-align: center; 
            padding: 30px; 
            background: #1e1e1e; 
            border-radius: 15px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); 
            max-width: 450px; 
            width: 90%; 
        }
        /* STYL MASZYNY DO PISANIA Z ZABRUDZENIAMI OD TUSZU */
        h1 { 
            margin-bottom: 25px; 
            font-size: 34px; 
            font-weight: normal; 
            font-family: 'Special Elite', 'Courier New', Courier, monospace; 
            letter-spacing: 1px;
            color: #e5e5e5; /* delikatnie złamana biel dla lepszego efektu starego papieru */
        }
        .player-box { 
            margin-top: 20px; 
            width: 100%; 
        }
        audio {
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Radio Wtedy</h1>
        
        <div class="player-box">
            <!-- ODWARZACZ LIVE ZE SLOTEX.PL -->
            <audio controls preload="none"><source src="https://slotex.pl"></audio>
        </div>
    </div>

</body>
</html>
