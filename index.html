<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Radio Wtedy - stacja radiowa stworzona z tęsknoty za dawną Listą Przebojów Programu Trzeciego. Tylko w czwartki na żywo od 18:00 na stronie radiowtedy.com." />

    
    <!-- WYMUSZENIE ODŚWIEŻANIA DLA SŁUCHACZY - BLOKADA CACHE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- AUTOMATYCZNE WERSJONOWANIE (CACHE-BUSTING) POPRZEZ ZMIANĘ PARAMETRU WERSJI CZCIONKI -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <title>radio wtedy - słuchaj na żywo</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* PRZENIESIENIE ZAWARTOŚCI NA SAMĄ GÓRĘ */
            min-height: 100vh; 
            
            /* PODPIĘCIE TWOJEGO PLIKU JPG JAKO TŁA STRONY */
            background-image: url('RW_logo_event.jpg');
            background-color: #151515; /* Kolor awaryjny zanim załaduje się obrazek */
            background-position: center center; /* Centrowanie obrazu */
            background-repeat: no-repeat; /* Brak powielania kafelkowego */
            background-size: cover; /* Automatyczne rozciągnięcie i dopasowanie do ekranu */
            background-attachment: fixed; /* Zablokowanie tła (nie przewija się) */
            
            position: relative;
        }

        .container { 
            text-align: center; 
            padding: 30px; 
            margin-top: 15px; /* BEZPIECZNY ODSTĘP OD GÓRNEJ KRAWĘDZI EKRANU */
            /* CIEMNOSZARA RAMKA Z SUBTELNĄ PRZEZROCZYSTOŚCIĄ */
            background: rgba(28, 28, 28, 0.9); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            max-width: 450px; 
            width: 90%; 
            z-index: 1;
        }
        /* STYL AMERICAN TYPEWRITER / CUTIVE MONO */
        h1 { 
            margin-bottom: 10px; 
            font-size: 32px; 
            font-weight: normal; 
            font-family: 'American Typewriter', 'Cutive Mono', Georgia, serif; 
            letter-spacing: 0px;
            color: #ffffff;
            text-transform: lowercase; 
        }
        .player-box { 
            margin-top: 20px; 
            margin-bottom: 25px;
            width: 100%; 
        }
        audio {
            width: 100%;
        }
        /* STYL DLA RETRO LINKÓW ORAZ TEKSTÓW INFORMACYJNYCH */
        .support-link, .contact-link, .info-text {
            font-family: 'American Typewriter', 'Cutive Mono', Georgia, serif;
            font-size: 11px; 
            color: #aaaaaa;
            text-transform: lowercase;
        }
        .support-link, .contact-link {
            display: block;
            text-decoration: underline;
            transition: color 0.2s ease;
        }
        .support-link {
            margin-top: 8px;
            margin-bottom: 8px;
        }
        .contact-link {
            margin-top: 8px;
        }
        .support-link:hover, .contact-link:hover {
            color: #ffffff;
        }
        .info-text {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- NAZWA RADIA -->
        <h1>radio wtedy</h1>
        
        <!-- CZAS EMISJI PRZENIESIONY NAD ODTWARZACZ -->
        <span class="info-text">tylko w czwartki od 18:00 do 23:00</span>

        <div class="player-box">
            <!-- ODWARZACZ LIVE ZE SLOTEX.PL -->
            <audio controls preload="none"><source src="https://slotex.pl"></audio>
        </div>

        <!-- POPRAWIONY LINK HTTPS PROWADZĄCY BEZPOŚREDNIO DO PROFILU RADIA -->
        <a href="https://suppi.pl" target="_blank" class="support-link">wesprzyj nas na:   na suppi.pl/radiowtedy</a>

        <!-- KONTAKT JAKO AKTYWNY LINK POD LINKIEM WSPARCIA -->
        <a href="mailto:radiowtedy@gmail.com" class="contact-link">kontakt - radiowtedy@gmail.com</a>
    </div>

</body>
</html>
